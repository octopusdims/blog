{{ $id := .id }}
{{ $title := .title }}
{{ $artist := .artist }}
{{ $src := .src }}
{{ $cover := .cover | default "/images/default-cover.jpg" }}

<div class="glass-music-player" data-player-id="{{ $id }}">
  <div class="player-main">
    <div class="player-cover">
      <img src="{{ $cover }}" alt="{{ $title }}" class="cover-img">
      <button class="play-btn" aria-label="播放/暂停">
        <svg class="play-icon" viewBox="0 0 24 24" fill="currentColor">
          <path d="M8 5v14l11-7z"/>
        </svg>
        <svg class="pause-icon" viewBox="0 0 24 24" fill="currentColor">
          <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
        </svg>
      </button>
      <div class="playing-indicator">
        <span></span><span></span><span></span>
      </div>
    </div>
    <div class="player-info">
      <div class="track-meta">
        <div class="track-title" title="{{ $title }}">{{ $title }}</div>
        <div class="track-artist" title="{{ $artist }}">{{ $artist }}</div>
      </div>
      <div class="track-progress">
        <span class="current-time">0:00</span>
        <div class="progress-bar">
          <div class="progress-fill"></div>
          <div class="progress-handle"></div>
        </div>
        <span class="duration">0:00</span>
      </div>
    </div>
  </div>
  <div class="player-controls">
    <button class="control-btn volume-btn" aria-label="音量">
      <svg class="volume-high" viewBox="0 0 24 24" fill="currentColor">
        <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
      </svg>
      <svg class="volume-mute" viewBox="0 0 24 24" fill="currentColor">
        <path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73 4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>
      </svg>
    </button>
    <div class="volume-slider">
      <div class="volume-bar">
        <div class="volume-fill"></div>
      </div>
    </div>
  </div>
  <audio class="audio-element" src="{{ $src }}" preload="metadata" onloadedmetadata="if(this.duration){this.closest('.glass-music-player').querySelector('.duration').textContent=Math.floor(this.duration/60)+':'+String(Math.floor(this.duration%60)).padStart(2,'0')}"></audio>
</div>
