{{ define "main" }}
<div class="error-page">
  <!-- 漂浮装饰元素 -->
  <div class="floating-shapes">
    <span class="shape" style="--delay:0s;--x:20%;--y:30%">✦</span>
    <span class="shape" style="--delay:1s;--x:80%;--y:20%">○</span>
    <span class="shape" style="--delay:2s;--x:70%;--y:70%">✦</span>
    <span class="shape" style="--delay:0.5s;--x:15%;--y:60%">○</span>
    <span class="shape" style="--delay:1.5s;--x:85%;--y:50%">✦</span>
  </div>
  
  <div class="error-container">
    <!-- 404 Liquid Glass with float animation -->
    <div class="error-glass-wrapper">
      <div class="error-glass-text" data-liquid-glass="error-code"></div>
      <!-- 装饰光环 -->
      <div class="glow-ring"></div>
    </div>
    
    <!-- 文字信息 -->
    <div class="error-info">
      <div class="error-icon kaomoji">¯\_(ツ)_/¯</div>
      <p class="error-message">页面未找到</p>
      <p class="error-description">抱歉，您访问的页面不存在或已被移除。</p>
      <a href="/" class="error-back" data-liquid-glass="error-button">
        <span class="back-content">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
            <polyline points="9 22 9 12 15 12 15 22"/>
          </svg>
          返回首页
        </span>
      </a>
    </div>
  </div>
</div>
{{ end }}
